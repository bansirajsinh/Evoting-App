name: evote
description: A blockchain-powered e-voting Flutter application with secure authentication and transparent voting processes.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase dependencies
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.3.7

  # UI dependencies
  google_fonts: ^5.1.0
  
  # Blockchain and Web3 dependencies
  web3dart: 2.7.3
  http: ^1.2.2
  
  # UI and Navigation dependencies
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.2.0
  
  # State Management
  provider: ^6.1.2
  
  # Utilities
  intl: ^0.20.1
  shared_preferences: ^2.3.4
  crypto: ^3.0.6
  uuid: ^4.5.1
  
  # Authentication and Security
  local_auth: ^3.0.1
  flutter_secure_storage: ^9.2.4
  
  # QR Code and Barcode
  qr_flutter: ^4.1.0
  
  # File handling
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  
  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.1
  
  # Permissions
  permission_handler: ^11.3.1
  firebase_analytics: ^11.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/logos/
    - assets/abi.json
